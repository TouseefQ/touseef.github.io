<!-- Contact section with form and social links -->
<section id="contact" class="contact animate-on-scroll">
  <h2>Get In Touch</h2>
  <p>Have a question or want to work together? I'd love to hear from you.</p>

  <form method="POST" action="https://formspree.io/f/xyzformid" class="contact-form">
    <!-- Name field -->
    <div class="form-group">
      <label for="contact-name">Name</label>
      <input
        type="text"
        id="contact-name"
        name="name"
        placeholder="Your Name"
        required
        aria-label="Your name">
    </div>

    <!-- Email field -->
    <div class="form-group">
      <label for="contact-email">Email</label>
      <input
        type="email"
        id="contact-email"
        name="email"
        placeholder="your@email.com"
        required
        aria-label="Your email address">
    </div>

    <!-- Message field -->
    <div class="form-group">
      <label for="contact-message">Message</label>
      <textarea
        id="contact-message"
        name="message"
        placeholder="Your message here..."
        rows="5"
        required
        aria-label="Your message"></textarea>
    </div>

    <!-- Submit button -->
    <button type="submit" class="btn btn-primary">Send Message</button>
  </form>

  <!-- Success message (hidden by default, shown by Formspree) -->
  <p class="form-status" style="display:none; color: green; margin-top: 1rem;">
    Thanks for reaching out! I'll get back to you soon.
  </p>

  <div class="social-links">
    <!-- Social links will be populated from _data/social.yml -->
  </div>
</section>
