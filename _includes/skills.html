<!-- Skills section with grid of categories -->
<section id="skills" class="skills">
  <h2>Skills</h2>
  <div class="skills-grid">
    {% for category in site.data.skills %}
      <div class="skill-category">
        <h3>{{ category.name }}</h3>
        <ul>
          {% for skill in category.items %}
            <li>{{ skill }}</li>
          {% endfor %}
        </ul>
      </div>
    {% endfor %}
  </div>
</section>
